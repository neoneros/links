<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リンクページ</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
      margin: 0;
    }
    h1 { font-size: 1.2rem; margin: 0 0 8px; }
    p.bio { font-size: 0.85rem; color: #aaa; margin: 0 0 32px; }

    .card {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: transform 0.2s, opacity 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    /* FANZAカード：白背景に赤字 */
    .fanza {
      background: #ffffff;
      color: #e60033;
    }
    .fanza .card-footer {
      background: #f5f5f5;
    }

    /* Stripchatカード：赤背景に白字 */
    .stripchat {
      background: #e60033;
      color: #ffffff;
    }
    .stripchat .card-footer {
      background: #c0002a;
    }

    .card-body {
      padding: 16px 20px 8px;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin: 0 0 6px;
    }
    .card-desc {
      font-size: 0.82rem;
      margin: 0;
      line-height: 1.5;
      opacity: 0.85;
    }
    .card-footer {
      padding: 8px 20px;
      font-size: 0.78rem;
      font-weight: bold;
      text-align: right;
    }
  </style>
</head>
<body>

  <h1>えねるどんてん</h1>
  <p class="bio">一言プロフィール</p>

  <!-- FANZAカード -->
  <a class="card fanza" href="ここにFANZAのアフィリエイトURL" target="_blank" rel="noopener">
    <div class="card-body">
      <p class="card-title">🎬 FANZA</p>
      <p class="card-desc">日本最大級のアダルト動画サービス。豊富な作品数と高画質で楽しめます。</p>
    </div>
    <div class="card-footer">今すぐチェック →</div>
  </a>

  <!-- Stripchatカード -->
  <a class="card stripchat" href="https://go.mavrtracktor.com?userId=0954bab5d3063efb586647d8b02b162f7940a994fe57f109a8c129e3a52b33f5" target="_blank" rel="noopener">
    <div class="card-body">
      <p class="card-title">💬 Stripchat</p>
      <p class="card-desc">世界中のモデルや本当の素人とリアルタイムでつながれるライブチャットサービス。</p>
    </div>
    <div class="card-footer">今すぐチェック →</div>
  </a>

</body>
</html>
